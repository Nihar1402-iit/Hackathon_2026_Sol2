# Configuration for Vision Transformer Monocular Depth Estimation with Knowledge Distillation

# Data Configuration
data:
  dataset_type: 'mock'  # 'mock', 'nyu', 'kitti'
  data_dir: './data'
  img_size: 384
  num_workers: 4

# Model Configuration
student_model:
  backbone_type: 'vit_tiny'  # 'vit_tiny', 'vit_small', 'vit_base', 'vit_large', 'resnet18', 'resnet34', 'resnet50'
  img_size: 384
  patch_size: 16
  use_token_merging: true
  merge_ratio: 0.3
  use_token_pruning: false
  prune_ratio: 0.2
  decoder_type: 'lightweight'  # 'hierarchical' or 'lightweight'
  base_channels: 128
  extract_layers: null  # Auto-select if null

teacher_model:
  backbone_type: 'vit_base'  # Larger than student
  img_size: 384
  patch_size: 16
  decoder_type: 'hierarchical'
  base_channels: 128
  freeze_backbone: true
  extract_layers: null

# Training Configuration
training:
  epochs: 100
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  gradient_clip_norm: 1.0
  
  # Optimization
  use_amp: true
  use_kd: true
  optimizer: 'adamw'  # 'adam', 'adamw', 'sgd'
  scheduler: 'cosine'  # 'cosine', 'step', 'exponential'
  
  # Checkpointing and logging
  checkpoint_dir: './checkpoints'
  log_interval: 10
  val_interval: 1
  save_interval: 5
  
  # Loss weights (λ1-λ8 from paper)
  loss_weights:
    depth_gt: 1.0          # λ1: Ground truth depth loss
    depth_silog: 0.1       # λ2: Scale-invariant log loss
    feature_kd: 0.5        # λ3: Feature distillation
    attention_kd: 0.1      # λ4: Attention distillation
    depth_kd: 0.5          # λ5: Depth distillation
    relational_kd: 0.1     # λ6: Relational distillation
    decoder_kd: 0.3        # λ7: Decoder feature distillation
    positional_kd: 0.05    # λ8: Positional encoding distillation

# Evaluation Configuration
evaluation:
  val_split: 0.1
  test_split: 0.1
  metrics:
    - rmse
    - abs_rel
    - delta1
    - delta2
    - delta3
    - silog

# Inference Configuration
inference:
  half_precision: false
  tta: false  # Test-time augmentation

# Logging Configuration
logging:
  level: 'INFO'
  save_dir: './logs'
  tensorboard: true
  wandb: false

# Seed for reproducibility
seed: 42
